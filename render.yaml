services:
  # Main overlay web service (Node/Express)
  - type: web
    name: viewer-counter
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TWITCH_CLIENT_ID
        sync: false
      - key: TWITCH_CLIENT_SECRET
        sync: false
      - key: TWITCH_USERNAME
        sync: false
      - key: KICK_CLIENT_ID
        sync: false
      - key: KICK_CLIENT_SECRET
        sync: false
      - key: KICK_USERNAME
        sync: false
      - key: RUMBLE_API_URL
        sync: false
      - key: RUMBLE_API_KEY
        sync: false
      - key: RUMBLE_CHANNEL
        sync: false
      - key: TIKTOK_SERVICE_URL
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_CHANNEL_ID
        sync: false
      - key: YOUTUBE_CHAT_SERVICE_URL
        sync: false
      - key: KICK_CHATROOM_ID
        sync: false
      - key: KICK_PUSHER_APP_KEY
        sync: false
      - key: INSTAGRAM_USERNAME
        sync: false
      - key: INSTAGRAM_SESSION
        sync: false
      - key: INSTAGRAM_LIVE_COMMENTS_URL
        sync: false
      - key: NIMO_SERVICE_URL
        sync: false
      - key: PORT
        value: 3000

  # TikTok LIVE sidecar (Python, TikTokLive.py + Flask)
  # Handles BOTH viewer counts (/status) and chat (/chat).
  # Deploy this as its own Render web service, then copy its public URL
  # into the main service's TIKTOK_SERVICE_URL env var above.
  - type: web
    name: viewer-counter-tiktok
    env: python
    plan: free
    buildCommand: pip install -r tiktok-service/requirements.txt
    startCommand: python tiktok-service/app.py
    envVars:
      - key: TIKTOK_USERNAME
        sync: false
      - key: PORT
        value: 5005

  # YouTube live chat sidecar (Python, pytchat + Flask)
  # Deploy this as its own Render web service, then copy its public URL
  # into the main service's YOUTUBE_CHAT_SERVICE_URL env var above.
  - type: web
    name: viewer-counter-youtube-chat
    env: python
    plan: free
    buildCommand: pip install -r youtube-chat-service/requirements.txt
    startCommand: python youtube-chat-service/app.py
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
      - key: PORT
        value: 5006

  # Nimo TV chat sidecar (Python, Playwright + Flask)
  # Nimo has no official chat API, so this drives a headless Chromium
  # page against the live room and reads the chat panel's DOM. Deploy
  # this as its own Render web service, then copy its public URL into
  # the main service's NIMO_SERVICE_URL env var above.
  - type: web
    name: viewer-counter-nimo
    env: python
    plan: free
    buildCommand: pip install -r nimo-service/requirements.txt && playwright install chromium
    startCommand: python nimo-service/app.py
    envVars:
      - key: NIMO_URL
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: PORT
        value: 5007
