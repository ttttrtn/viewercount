<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Viewer Count Overlay</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="panel" id="panel">
    <span class="icon-wrap hidden" id="wrap-twitch">
      <img class="icon" src="icons/twitch.svg" alt="Twitch" />
    </span>
    <span class="icon-wrap hidden" id="wrap-kick">
      <img class="icon" src="icons/kick.svg" alt="Kick" />
    </span>
    <span class="icon-wrap hidden" id="wrap-rumble">
      <img class="icon" src="icons/rumble.svg" alt="Rumble" />
    </span>
    <span class="icon-wrap hidden" id="wrap-tiktok">
      <img class="icon" src="icons/tiktok.svg" alt="TikTok" />
    </span>
    <span class="icon-wrap hidden" id="wrap-youtube">
      <img class="icon" src="icons/youtube.svg" alt="YouTube" />
    </span>
    <span class="count" id="count">0</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
